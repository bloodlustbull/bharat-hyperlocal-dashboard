name: Refresh Market Signals

on:
  schedule:
    # Runs daily at 6:00 AM IST (0:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch market signals
        run: node scripts/fetch-market-signals.cjs
        env:
          NODE_NO_WARNINGS: 1

      - name: Copy data to public/ for Vite build
        run: |
          mkdir -p public/data
          cp -r data/* public/data/

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          git commit --allow-empty -m "chore: auto-refresh market signals $(date -u '+%Y-%m-%d')"
          git push